appId: com.spiral.app
productName: Spiral
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  # Native binaries must live outside the asar so electron-builder can sign each
  # one individually; unsigned native code inside the asar fails notarization.
  - node_modules/node-llama-cpp/**/*.node
  - node_modules/node-llama-cpp/bins/**
win:
  executableName: spiral
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Developer ID (outside the Mac App Store) signing + notarization. Required for
  # Squirrel.Mac auto-update to actually apply downloaded updates — unsigned mac
  # builds silently refuse to install and the in-app "Installing…" pill hangs.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # The signing identity ("Developer ID Application: … (TEAMID)") is auto-discovered
  # from the login keychain. In CI, provide it via CSC_LINK + CSC_KEY_PASSWORD.
  # Notarization (notarytool) reads APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD and
  # APPLE_TEAM_ID from the environment.
  notarize: true
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  target:
    - dmg
    - zip
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: developer82
  repo: Spiral
